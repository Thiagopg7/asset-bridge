# Apenas SECURITY updates estao ativos.
#
# Os "version updates" de rotina (PR a cada nova versao de qualquer pacote)
# estao DESATIVADOS via open-pull-requests-limit: 0, para evitar ruido.
#
# A protecao contra dependencias vulneraveis continua por outras duas vias:
#   1. Dependabot security updates + alerts (Settings > Code security) -> abre
#      PR/alerta SOMENTE quando ha uma vulnerabilidade conhecida (CVE).
#   2. Job "dependencies" no CI (composer audit + npm audit), que bloqueia o
#      merge se entrar dependencia com vulnerabilidade conhecida.
#
# Para reativar os version updates: suba o open-pull-requests-limit e
# restaure os "groups"/"update-types".
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
